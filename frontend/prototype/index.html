<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APP FACTORY VIDEO IA - Plataforma</title>
    <link rel="stylesheet" href="./styles.css?v=9.1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegación principal">
        <div class="brand">
          <div class="brand-mark">AF</div>
          <div>
            <strong>APP FACTORY</strong>
            <span>VIDEO IA</span>
          </div>
        </div>
        <nav class="side-nav" id="sideNav"></nav>
        <div class="network-card">
          <span class="eyebrow">Próxima ejecución</span>
          <strong>21:00 CLT</strong>
          <p>Análisis de oportunidades, ideas, narrativa y plan de producción en modo demostración.</p>
          <div class="mini-orbit"><i></i><i></i><i></i></div>
        </div>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <button class="menu-toggle" id="menuToggle" type="button" aria-label="Abrir menú">☰</button>
          <div class="title-block">
            <span class="eyebrow">AppFactoryChile · Plataforma global de contenido IA</span>
            <h1 id="pageTitle">Panel principal</h1>
          </div>
          <div class="top-actions">
            <button class="ghost-btn" data-soon>Exportar reporte</button>
            <button class="primary-btn" data-go="mvp-workflow">Crear contenido</button>
          </div>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status">Próximamente</div>
    <script src="./app.js?v=9.1"></script>
  </body>
</html>
